<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 外圍金色環 -->
    <linearGradient id="ringGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="25%" stop-color="#daa520"/>
      <stop offset="50%" stop-color="#b8860b"/>
      <stop offset="75%" stop-color="#daa520"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>

    <!-- 內圈漸層 -->
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#1a1015"/>
      <stop offset="50%" stop-color="#12080c"/>
      <stop offset="100%" stop-color="#080408"/>
    </radialGradient>

    <!-- 紅色點綴 -->
    <linearGradient id="redAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e63946"/>
      <stop offset="50%" stop-color="#c1121f"/>
      <stop offset="100%" stop-color="#780000"/>
    </linearGradient>

    <!-- 金色光 -->
    <linearGradient id="goldLight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>

    <!-- 馬匹暗色 -->
    <linearGradient id="horseBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a2025"/>
      <stop offset="100%" stop-color="#1a0c10"/>
    </linearGradient>

    <!-- 騎兵盔甲 -->
    <linearGradient id="armorDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a3035"/>
      <stop offset="50%" stop-color="#2a151a"/>
      <stop offset="100%" stop-color="#1a080c"/>
    </linearGradient>

    <!-- 披風紅 -->
    <linearGradient id="capeRed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e63946"/>
      <stop offset="40%" stop-color="#c1121f"/>
      <stop offset="100%" stop-color="#780000"/>
    </linearGradient>

    <!-- 文字金色 -->
    <linearGradient id="textGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#daa520"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>

    <!-- 陰影 -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.6"/>
    </filter>

    <filter id="deepShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.8"/>
    </filter>

    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 繞圓文字路徑 - 上方 -->
    <path id="textArcTop" d="M 130,256 A 126,126 0 1,1 382,256"/>
    <!-- 繞圓文字路徑 - 下方 -->
    <path id="textArcBottom" d="M 382,256 A 126,126 0 0,1 130,256"/>
  </defs>

  <!-- ===== 主背景圓 ===== -->
  <circle cx="256" cy="256" r="244" fill="url(#bgGrad)" stroke="url(#ringGold)" stroke-width="5"/>

  <!-- 內圈紅線 -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="#c1121f" stroke-width="1.5" opacity="0.6"/>
  <circle cx="256" cy="256" r="222" fill="none" stroke="#c1121f" stroke-width="0.5" opacity="0.3" stroke-dasharray="4 6"/>

  <!-- ===== 繞圓上方文字 BLADE GUIDE ===== -->
  <text font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="800" letter-spacing="8" fill="url(#textGold)" filter="url(#goldGlow)">
    <textPath href="#textArcTop" startOffset="50%" text-anchor="middle">BLADE GUIDE</textPath>
  </text>

  <!-- ===== 繞圓下方文字 刀刃攻略 ===== -->
  <text font-family="'Noto Serif TC', 'Source Han Serif TC', serif" font-size="30" font-weight="900" letter-spacing="5" fill="url(#textGold)">
    <textPath href="#textArcBottom" startOffset="50%" text-anchor="middle">刀刃攻略</textPath>
  </text>

  <!-- ===== 馬 + 騎士 ===== -->
  <g filter="url(#deepShadow)">
    <!-- 披風（在後面） -->
    <path d="M 240,170 Q 200,200 185,240 Q 175,270 170,300 L 185,305 Q 195,275 210,250 Q 225,225 250,195 Z"
          fill="url(#capeRed)" opacity="0.85"/>

    <!-- 披風飄動 -->
    <path d="M 185,240 Q 140,255 130,280 Q 125,300 140,310 Q 148,298 150,280 Q 155,260 185,250 Z"
          fill="url(#capeRed)" opacity="0.6"/>

    <!-- 馬身 -->
    <path d="
      M 140,340
      Q 135,310 145,290
      Q 150,275 165,265
      Q 170,260 180,258
      Q 200,250 240,252
      Q 270,255 290,260
      Q 310,268 320,280
      Q 335,300 340,320
      Q 342,335 340,350
      Q 330,360 310,358
      L 290,355
      Q 280,345 275,345
      L 260,340
      Q 250,345 240,345
      L 220,340
      Q 210,345 200,345
      L 185,342
      Q 170,348 160,350
      Q 142,358 140,340 Z
    " fill="url(#horseBody)" stroke="#c1121f" stroke-width="0.5"/>

    <!-- 馬鬃 -->
    <path d="M 280,258 Q 285,248 282,240 Q 275,238 270,245 Q 265,252 268,256"
          fill="url(#redAccent)" stroke="none"/>

    <!-- 馬尾 -->
    <path d="M 340,320 Q 360,310 365,290 Q 368,275 360,270 Q 355,280 350,295 Q 345,310 340,320 Z"
          fill="url(#redAccent)"/>

    <!-- 馬腿 - 前左 -->
    <path d="M 180,335 L 178,365 Q 176,375 180,378 L 185,377 Q 183,368 185,335 Z" fill="#1a0c10"/>
    <!-- 馬腿 - 前右 -->
    <path d="M 195,338 L 200,370 Q 202,378 206,380 L 210,379 Q 207,370 205,340 Z" fill="#2a151a"/>
    <!-- 馬腿 - 後左 -->
    <path d="M 300,340 L 298,368 Q 297,376 300,379 L 305,378 Q 303,368 305,340 Z" fill="#1a0c10"/>
    <!-- 馬腿 - 後右 -->
    <path d="M 315,345 L 320,372 Q 322,380 326,381 L 330,380 Q 327,372 325,345 Z" fill="#2a151a"/>

    <!-- 馬蹄金邊 -->
    <rect x="178" y="376" width="9" height="4" rx="1" fill="url(#goldLight)"/>
    <rect x="198" y="378" width="10" height="4" rx="1" fill="url(#goldLight)"/>
    <rect x="296" y="377" width="9" height="4" rx="1" fill="url(#goldLight)"/>
    <rect x="318" y="379" width="10" height="4" rx="1" fill="url(#goldLight)"/>

    <!-- 馬鞍 -->
    <path d="M 230,252 Q 235,245 245,243 Q 260,243 270,248 L 268,254 Q 255,250 240,252 Z"
          fill="#4a1515" stroke="#daa520" stroke-width="0.8"/>

    <!-- ===== 騎士 ===== -->

    <!-- 腿部 -->
    <path d="M 235,248 Q 230,240 232,235 L 240,237 Q 242,242 240,248 Z" fill="url(#armorDark)"/>
    <path d="M 248,248 Q 250,240 255,236 L 260,238 Q 258,243 255,248 Z" fill="url(#armorDark)"/>

    <!-- 軀幹/胸甲 -->
    <path d="
      M 232,235
      Q 226,220 228,205
      Q 230,190 240,180
      Q 248,172 258,170
      L 262,172
      Q 258,178 258,185
      Q 255,195 255,205
      Q 252,218 250,228
      L 248,238
    " fill="url(#armorDark)" stroke="#daa520" stroke-width="0.5"/>

    <!-- 胸前金色裝飾 -->
    <path d="M 238,190 L 250,188 L 248,198 L 240,200 Z" fill="url(#goldLight)" opacity="0.7"/>
    <line x1="245" y1="200" x2="245" y2="220" stroke="#daa520" stroke-width="0.5" opacity="0.5"/>

    <!-- 腰部金帶 -->
    <rect x="230" y="228" width="24" height="4" rx="1" fill="url(#goldLight)"/>

    <!-- 頭盔 -->
    <path d="
      M 236,170
      Q 234,160 238,152
      Q 242,145 250,143
      Q 258,143 262,148
      Q 266,152 264,160
      Q 262,168 260,172
    " fill="url(#armorDark)" stroke="#daa520" stroke-width="0.8"/>

    <!-- 頭盔頂飾（紅羽） -->
    <path d="M 250,143 Q 248,125 255,108 Q 262,100 268,105 Q 264,115 260,130 Q 255,142 252,143 Z"
          fill="url(#redAccent)"/>

    <!-- 頭盔面罩 -->
    <path d="M 238,162 Q 236,170 240,172 L 258,172 Q 262,168 260,160 Q 258,155 254,154 Q 248,153 243,155 Q 238,158 238,162 Z"
          fill="#1a0a10" stroke="#daa520" stroke-width="0.5"/>

    <!-- 面罩縫隙 -->
    <line x1="244" y1="157" x2="253" y2="157" stroke="#daa520" stroke-width="0.5" opacity="0.6"/>
    <line x1="243" y1="162" x2="255" y2="162" stroke="#daa520" stroke-width="0.5" opacity="0.6"/>

    <!-- ===== 長矛/偃月刀 ===== -->
    <!-- 矛桿 -->
    <line x1="240" y1="135" x2="268" y2="172" stroke="#8b6914" stroke-width="3"/>
    <line x1="240" y1="135" x2="268" y2="172" stroke="#daa520" stroke-width="1" opacity="0.5"/>

    <!-- 矛頭/刀刃 - 偃月刀型 -->
    <path d="
      M 240,135
      Q 235,120 238,100
      Q 240,85 248,78
      Q 255,72 260,76
      Q 258,85 255,98
      Q 250,115 248,125
      L 252,135
    " fill="url(#redAccent)" stroke="#ffd700" stroke-width="0.5"/>

    <!-- 刀刃金屬光澤 -->
    <path d="M 240,135 Q 238,120 240,105 Q 242,95 246,88 Q 242,100 242,120 Z"
          fill="#ff4444" opacity="0.4"/>

    <!-- 矛纓（紅纓） -->
    <path d="M 246,128 Q 238,126 232,130 Q 230,134 234,136 Q 238,134 244,132 Z"
          fill="#e63946"/>
    <path d="M 248,130 Q 240,132 236,138 Q 240,140 248,136 Z"
          fill="#c1121f"/>

    <!-- 盾牌（左臂） -->
    <path d="
      M 222,198
      Q 214,205 215,218
      Q 216,232 222,238
      Q 226,242 232,240
      Q 236,236 234,228
      Q 232,210 228,200
    " fill="url(#redAccent)" stroke="#daa520" stroke-width="1"/>

    <!-- 盾牌金色十字 -->
    <line x1="224" y1="202" x2="224" y2="238" stroke="#daa520" stroke-width="0.8" opacity="0.7"/>
    <line x1="216" y1="218" x2="232" y2="218" stroke="#daa520" stroke-width="0.8" opacity="0.7"/>
  </g>

  <!-- 裝飾星角 - 左上 -->
  <g opacity="0.5">
    <polygon points="88,88 92,102 106,102 94,110 98,124 88,114 78,124 82,110 70,102 84,102"
             fill="url(#goldLight)" filter="url(#goldGlow)"/>
  </g>

  <!-- 裝飾星角 - 右上 -->
  <g opacity="0.5">
    <polygon points="424,88 428,102 442,102 430,110 434,124 424,114 414,124 418,110 406,102 420,102"
             fill="url(#goldLight)" filter="url(#goldGlow)"/>
  </g>

  <!-- 裝飾星角 - 左下 -->
  <g opacity="0.4">
    <polygon points="88,424 92,438 106,438 94,446 98,460 88,450 78,460 82,446 70,438 84,438"
             fill="url(#goldLight)" filter="url(#goldGlow)"/>
  </g>

  <!-- 裝飾星角 - 右下 -->
  <g opacity="0.4">
    <polygon points="424,424 428,438 442,438 430,446 434,460 424,450 414,460 418,446 406,438 420,438"
             fill="url(#goldLight)" filter="url(#goldGlow)"/>
  </g>
</svg>
